<script type="text/javascript" src="js/jquery-1.4.2.min.js"></script>
<script type="text/javascript">
function slideSwitch() {
    var $active = $('#slideshow IMG.active');

    if ( $active.length == 0 ) $active = $('#slideshow IMG:last');

    // use this to pull the images in the order they appear in the markup
    var $next =  $active.next().length ? $active.next()
        : $('#slideshow IMG:first');
  $active.addClass('last-active');

    $next.css({opacity: 0.0})
        .addClass('active')
        .animate({opacity: 1.0}, 1000, function() {
            $active.removeClass('active last-active');
        });
}

$(function() {
    setInterval( "slideSwitch()", 5000 );
});

</script>

<style type="text/css">
body { margin:0; padding:0; overflow:hidden; background:#f5f0e6; }
/* Match home.html iframe / .banner_main (641×310) so photos fill the inner frame */
#slideshow {
  position:relative;
  width:641px;
  height:310px;
  overflow:hidden;
}
#slideshow IMG {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
  z-index:8;
  opacity:0.0;
  /* Sharper downscale than decoding 6000px originals into a 641px box */
  image-rendering: smooth;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}
@supports (image-rendering: high-quality) {
  #slideshow IMG { image-rendering: high-quality; }
}
#slideshow IMG.active {z-index:10;opacity:1.0;}
#slideshow IMG.last-active {z-index:9;}
</style>

</head>

<body>
<div id="slideshow">
    <img src="images/banner_hero/1.jpg" alt="Slideshow Image 1" class="active" width="1282" height="854" decoding="sync" fetchpriority="high" />
    <img src="images/banner_hero/2.jpg" alt="Slideshow Image 2" width="1282" height="854" decoding="async" />
    <img src="images/banner_hero/3.jpg" alt="Slideshow Image 3" width="1282" height="854" decoding="async" />
    <img src="images/banner_hero/4.jpg" alt="Slideshow Image 4" width="1282" height="854" decoding="async" />
    <img src="images/banner_hero/5.jpg" alt="Slideshow Image 5" width="1282" height="854" decoding="async" />
</div>

</body>
